<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0a0c10;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
}

.card {
  background: #13161f;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
  border: 1px solid #252a3a;
}

h3 {
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  background: #1a1e2b;
  color: white;
  outline: none;
}

input:focus {
  border: 1px solid #5b8df6;
}

button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  background: #5b8df6;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

#error {
  margin-top: 10px;
  color: #f08080;
  font-size: 12px;
  display: none;
}
</style>
</head>

<body>

<div class="card">
  <h3>Accesso riservato</h3>
  <input type="password" id="pass" placeholder="Inserisci password">
  <button onclick="login()">Accedi</button>
  <div id="error">Password errata</div>
</div>

<script>
const PASSWORD = "Capirossi1987";

function login() {
  const val = document.getElementById("pass").value;

  if (val === PASSWORD) {

    // 🔥 MODALITÀ ADMIN (rimane su questa pagina)
    if (window.location.search.includes("admin")) {
      alert("Accesso ADMIN - rimani su Access Log");
      return;
    }

    // 🔁 REDIRECT ALLA WEB APP PRINCIPALE
    window.location.href = "index.html";

  } else {
    document.getElementById("error").style.display = "block";
  }
}

// ENTER KEY SUPPORT
document.getElementById("pass").addEventListener("keydown", function(e){
  if (e.key === "Enter") login();
});
</script>

</body>
</html>
